<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="Functions.js"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen font-sans text-gray-800">
<div class="bg-white p-8 rounded-xl shadow-lg w-80 flex flex-col items-center">
    <h2 class="text-2xl font-bold mb-6">Simple Calculator</h2>

    <input class="w-full mb-3 px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" id="num1" placeholder="0" type="number">
    <input class="w-full mb-6 px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" id="num2" placeholder="0" type="number">

    <div class="grid grid-cols-2 gap-3 w-full mb-6">
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded shadow transition" onclick="handleAction('add')">Add (+)</button>
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded shadow transition" onclick="handleAction('sub')">Subtract (-)</button>
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded shadow transition" onclick="handleAction('mul')">Multiply (*)</button>
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded shadow transition" onclick="handleAction('div')">Divide (/)</button>
    </div>

    <div class="w-full bg-gray-50 border border-gray-200 text-center p-3 rounded font-semibold text-gray-600" id="result">
        Result will appear here
    </div>

</div>

<script>
    function handleAction(operation) {
        const val1 = parseFloat(document.getElementById('num1').value) || 0;
        const val2 = parseFloat(document.getElementById('num2').value) || 0;

        if (operation === 'add') add(val1, val2);
        if (operation === 'sub') sub(val1, val2);
        if (operation === 'mul') mul(val1, val2);
        if (operation === 'div') div(val1, val2);
    }
</script>
</body>
</html>
